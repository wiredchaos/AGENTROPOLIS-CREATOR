<!doctype html>
<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>NEUROBLOCK STUDIO</title><style>
:root{--bg:#020509;--panel:#07111d;--line:#12324a;--cyan:#00ffd5;--red:#ff2d55;--white:#eef7ff;--muted:#7b91a7}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,#082334,#020509 45%);color:var(--white);font-family:Inter,system-ui,Arial}button,input,textarea,select{font:inherit}button{background:#0a1a2a;color:var(--white);border:1px solid var(--line);border-radius:10px;padding:9px 12px;cursor:pointer}button:hover{border-color:var(--cyan);box-shadow:0 0 18px #00ffd533}.app{height:100vh;display:grid;grid-template-rows:64px 1fr}.top{display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line);background:#02070ccc}.brand{font-weight:900;letter-spacing:.08em}.brand span{color:var(--cyan)}.tag{color:var(--muted);font-size:13px}.main{display:grid;grid-template-columns:220px 1fr 320px;min-height:0}.panel{background:#06111dcc;border-right:1px solid var(--line);padding:14px;overflow:auto}.right{border-left:1px solid var(--line);border-right:0}.section{margin-bottom:18px}.section h3{font-size:12px;color:var(--cyan);letter-spacing:.14em;text-transform:uppercase;margin:0 0 10px}.tool{display:block;width:100%;margin:7px 0;text-align:left}.stageWrap{display:grid;grid-template-rows:1fr 150px;min-width:0}.stage{position:relative;overflow:hidden;background:linear-gradient(#06131f,#03070c);background-image:linear-gradient(#12324a55 1px,transparent 1px),linear-gradient(90deg,#12324a55 1px,transparent 1px);background-size:40px 40px}.stage:before{content:'SCENE LAB GRID';position:absolute;top:14px;left:16px;color:#00ffd566;letter-spacing:.2em}.marker{position:absolute;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;user-select:none;cursor:grab;border:2px solid var(--cyan);background:#081a2c;box-shadow:0 0 20px #00ffd544}.camera{border-color:#fff}.actor{border-color:var(--red)}.light{border-color:#ffd166}.prop{border-radius:8px;border-color:#9d4edd}.agent{border-color:#00ffd5;background:#111}.selected{outline:3px solid #fff8}.cards{border-top:1px solid var(--line);background:#04101bcc;padding:12px;display:flex;gap:10px;overflow:auto}.card{min-width:220px;background:#081727;border:1px solid var(--line);border-radius:14px;padding:10px}.card.active{border-color:var(--cyan)}.score{height:8px;background:#14283a;border-radius:99px;overflow:hidden}.score i{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--cyan));width:70%}label{font-size:12px;color:var(--muted);display:block;margin-top:10px}input,textarea,select{width:100%;background:#020910;color:var(--white);border:1px solid var(--line);border-radius:10px;padding:8px}textarea{min-height:72px}.warning{border:1px solid #ff2d5580;background:#240811;border-radius:10px;padding:9px;margin:8px 0;color:#ffd6df;font-size:13px}.ok{border-color:#00ffd580;background:#06231f;color:#cffff6}.export{white-space:pre-wrap;background:#020910;border:1px solid var(--line);border-radius:12px;padding:10px;color:#d8fff7;font-size:12px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button.active{border-color:var(--cyan);color:var(--cyan)}@media(max-width:900px){.main{grid-template-columns:1fr}.panel.right{display:none}.panel{display:none}}
</style></head><body><div class='app'><header class='top'><div><div class='brand'>NEUROBLOCK <span>STUDIO</span></div><div class='tag'>Spatial shot planning for AI-native filmmakers</div></div><div class='tabs'><button class='active'>Mission Control</button><button>Scene Lab</button><button>Prompt Forge</button><button>Swarm Mode</button></div></header><main class='main'><aside class='panel'><div class='section'><h3>Add Marker</h3><button class='tool' onclick="add('actor')">＋ Actor</button><button class='tool' onclick="add('camera')">＋ Camera</button><button class='tool' onclick="add('light')">＋ Light</button><button class='tool' onclick="add('prop')">＋ Prop</button><button class='tool' onclick="add('agent')">＋ Agent</button></div><div class='section'><h3>Project</h3><button class='tool' onclick='seed()'>Load Demo</button><button class='tool' onclick='save()'>Save Local</button><button class='tool' onclick='load()'>Load Local</button><button class='tool' onclick='exportBrief()'>Export Brief</button></div><div class='section'><h3>Agent Director</h3><div id='tips'></div></div></aside><section class='stageWrap'><div id='stage' class='stage'></div><div id='cards' class='cards'></div></section><aside class='panel right'><div class='section'><h3>Inspector</h3><div id='inspector'>Select a marker or shot card.</div></div><div class='section'><h3>Validation</h3><div id='warnings'></div></div><div class='section'><h3>Planning Forge</h3><div id='export' class='export'>Export appears here.</div></div></aside></main></div><script>
let state={items:[],shots:[],selected:null,activeShot:0};const stage=document.getElementById('stage');
function uid(){return Math.random().toString(36).slice(2,8)}
function add(type){state.items.push({id:uid(),type,name:type.toUpperCase()+' '+(state.items.length+1),x:120+state.items.length*35,y:120+state.items.length*25,rotation:0,lens:type==='camera'?'35mm':'',notes:''});render();}
function seed(){state={items:[{id:'a1',type:'actor',name:'Lead',x:300,y:230,rotation:0,notes:'calm but tense'},{id:'a2',type:'actor',name:'Witness',x:420,y:260,rotation:180,notes:'seated'},{id:'a3',type:'actor',name:'Observer',x:520,y:190,rotation:90,notes:'silent'},{id:'c1',type:'camera',name:'CAM A',x:180,y:320,rotation:20,lens:'35mm',notes:'medium two-shot'},{id:'c2',type:'camera',name:'CAM B',x:620,y:330,rotation:-35,lens:'85mm',notes:'close-up tension'},{id:'l1',type:'light',name:'Key Light',x:260,y:80,rotation:0,notes:'cyan overhead'},{id:'l2',type:'light',name:'Rim Light',x:650,y:100,rotation:0,notes:'red edge'},{id:'p1',type:'prop',name:'Table',x:390,y:310,rotation:0,notes:'metal desk'}],shots:[{id:'s1',title:'Opening pressure',camera:'CAM A',summary:'Wide briefing room tension',movement:'slow push',lighting:'cyan overhead',dialogue:'We found the signal.',continuity:'Lead standing left of table.',score:86},{id:'s2',title:'Witness closeup',camera:'CAM B',summary:'Witness reacts to unseen evidence',movement:'locked off',lighting:'red rim light',dialogue:'That was not a person.',continuity:'Witness remains seated.',score:74},{id:'s3',title:'Evidence reveal',camera:'CAM A',summary:'Prop insert on table',movement:'tilt down',lighting:'hard top light',dialogue:'',continuity:'Table unchanged.',score:62},{id:'s4',title:'Final eyeline',camera:'CAM B',summary:'Lead and Observer exchange look',movement:'rack focus',lighting:'mixed cyan red',dialogue:'Seal the room.',continuity:'Observer stays rear right.',score:91}],selected:null,activeShot:0};render();}
function render(){stage.innerHTML='';state.items.forEach(it=>{let d=document.createElement('div');d.className='marker '+it.type+(state.selected===it.id?' selected':'');d.style.left=it.x+'px';d.style.top=it.y+'px';d.textContent={actor:'A',camera:'C',light:'L',prop:'P',agent:'N'}[it.type];d.onclick=e=>{state.selected=it.id;render()};drag(d,it);stage.appendChild(d)});renderCards();renderInspector();validate();}
function drag(el,it){let ox,oy,on=false;el.onpointerdown=e=>{on=true;ox=e.clientX-it.x;oy=e.clientY-it.y;el.setPointerCapture(e.pointerId)};el.onpointermove=e=>{if(!on)return;it.x=e.clientX-ox;it.y=e.clientY-oy;renderInspector();validate();el.style.left=it.x+'px';el.style.top=it.y+'px'};el.onpointerup=()=>{on=false;save(false)}}
function renderCards(){cards.innerHTML='';state.shots.forEach((s,i)=>{let c=document.createElement('div');c.className='card '+(i===state.activeShot?'active':'');c.onclick=()=>{state.activeShot=i;state.selected=null;render()};c.innerHTML='<b>'+s.title+'</b><p>'+s.summary+'</p><small>'+s.camera+' • '+s.movement+'</small><div class=score><i style="width:'+s.score+'%"></i></div>';cards.appendChild(c)})}
function renderInspector(){let it=state.items.find(x=>x.id===state.selected), s=state.shots[state.activeShot], box=document.getElementById('inspector');if(it){box.innerHTML=`<label>Name</label><input value='${it.name}' oninput="editItem('name',this.value)"><label>Type</label><input value='${it.type}' disabled><label>X</label><input value='${Math.round(it.x)}' oninput="editItem('x',+this.value)"><label>Y</label><input value='${Math.round(it.y)}' oninput="editItem('y',+this.value)"><label>Rotation</label><input value='${it.rotation}' oninput="editItem('rotation',+this.value)"><label>Lens / Detail</label><input value='${it.lens||''}' oninput="editItem('lens',this.value)"><label>Notes</label><textarea oninput="editItem('notes',this.value)">${it.notes||''}</textarea>`}else if(s){box.innerHTML=`<label>Shot Title</label><input value='${s.title}' oninput="editShot('title',this.value)"><label>Summary</label><textarea oninput="editShot('summary',this.value)">${s.summary}</textarea><label>Camera</label><input value='${s.camera}' oninput="editShot('camera',this.value)"><label>Movement</label><input value='${s.movement}' oninput="editShot('movement',this.value)"><label>Lighting</label><input value='${s.lighting}' oninput="editShot('lighting',this.value)"><label>Dialogue</label><textarea oninput="editShot('dialogue',this.value)">${s.dialogue}</textarea><label>Continuity</label><textarea oninput="editShot('continuity',this.value)">${s.continuity}</textarea>`}}
function editItem(k,v){let it=state.items.find(x=>x.id===state.selected);it[k]=v;save(false);render()}function editShot(k,v){state.shots[state.activeShot][k]=v;score();save(false);render()}function score(){let s=state.shots[state.activeShot];let fields=['title','summary','camera','movement','lighting','continuity'];s.score=Math.round(fields.filter(f=>s[f]).length/fields.length*100)}
function validate(){let w=[];let cams=state.items.filter(i=>i.type==='camera'), actors=state.items.filter(i=>i.type==='actor');if(cams.length<1)w.push('Add at least one camera marker.');if(actors.length<2)w.push('Add at least two actor markers for eyeline checks.');if(state.items.length>10)w.push('Set may be overloaded. Consider reducing clutter.');if(cams.some(c=>actors.some(a=>Math.hypot(c.x-a.x,c.y-a.y)<70)))w.push('Camera collision risk near actor marker.');let s=state.shots[state.activeShot];if(s&&s.score<80)w.push('Prompt metadata incomplete. Improve shot readiness.');warnings.innerHTML=(w.length?w:['Scene validation looks stable.']).map((x,i)=>`<div class='warning ${w.length?'':'ok'}'>${x}</div>`).join('');tips.innerHTML=['Keep camera direction consistent across dialogue.','Add wardrobe and prop state notes before export.','Use one emotional tone per shot card.'].map(x=>`<div class='warning ok'>${x}</div>`).join('')}
function exportBrief(){let s=state.shots[state.activeShot];let exportEl=`NEUROBLOCK STUDIO BRIEF\n\nScene: ${s.title}\nSummary: ${s.summary}\nCamera: ${s.camera}\nMovement: ${s.movement}\nLighting: ${s.lighting}\nDialogue: ${s.dialogue}\nContinuity: ${s.continuity}\nReadiness Score: ${s.score}%\n\nMarkers:\n`+state.items.map(i=>`- ${i.type}: ${i.name} at ${Math.round(i.x)},${Math.round(i.y)} ${i.notes||''}`).join('\n');document.getElementById('export').textContent=exportEl}
function save(alertUser=true){localStorage.setItem('neuroblock',JSON.stringify(state));if(alertUser)alert('Saved locally.')}function load(){let v=localStorage.getItem('neuroblock');if(v){state=JSON.parse(v);render()}}seed();
</script></body></html>
